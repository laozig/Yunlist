services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunlist-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      FILES_ROOT: /data/yunlist/files
      DB_PATH: /data/yunlist/db/yunlist.db
      FRONTEND_DIST_PATH: /app/frontend/dist
    volumes:
      - ./data/files:/data/yunlist/files
      - ./data/db:/data/yunlist/db
    networks:
      - yunlist

  caddy:
    image: caddy:2.8-alpine
    container_name: yunlist-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - yunlist

networks:
  yunlist:
    driver: bridge